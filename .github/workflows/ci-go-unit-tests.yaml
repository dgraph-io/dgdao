name: ci-go-unit-tests

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "**/*.md"
      - .github/workflows/*

permissions:
  contents: read
  actions: write

jobs:
  ci-go-tests:
    timeout-minutes: 20
    name: Test ${{ matrix.os }}
    runs-on:
      "${{ matrix.os == 'linux' && 'ubuntu-latest' || matrix.os == 'macos' && 'macos-latest'}}"

    strategy:
      fail-fast: false
      matrix:
        os: [linux, macos]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.4
          cache-dependency-path: go.sum

      - name: Run Unit Tests
        run: go test -short -race -v .

  # Runs the same suite against a real Dgraph cluster. Setting DGDAO_TEST_ADDR
  # activates the dgraph:// cases that the embedded-only job skips. Linux only:
  # macOS runners have no Docker.
  ci-go-tests-dgraph:
    timeout-minutes: 20
    name: Test remote Dgraph (linux)
    runs-on: ubuntu-latest

    services:
      dgraph:
        # Keep the tag in lockstep with the dgraph-io/dgraph version in go.mod.
        image: dgraph/standalone:v25.3.8
        ports:
          - 8080:8080
          - 9080:9080

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.4
          cache-dependency-path: go.sum

      # The standalone image declares no HEALTHCHECK, so the services block
      # can't gate on readiness — poll the alpha health endpoint ourselves.
      - name: Wait for Dgraph
        run: |
          for i in $(seq 1 30); do
            if curl -sf localhost:8080/health | grep -q healthy; then
              exit 0
            fi
            sleep 2
          done
          echo "Dgraph did not become healthy in time"
          curl -sv localhost:8080/health || true
          exit 1

      - name: Run Unit Tests against Dgraph
        env:
          DGDAO_TEST_ADDR: localhost:9080
        run: go test -short -race -v .
